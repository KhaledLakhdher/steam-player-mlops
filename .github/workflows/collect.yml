# The "living system": collect current player counts on a schedule and commit them back to the
# repo. Runs in the cloud (laptop-independent). Committing the data versions it for free and keeps
# the scheduled workflow itself alive (GitHub disables crons after ~60 days of no repo activity).
name: collect-players

on:
  schedule:
    - cron: "0 */6 * * *"     # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write              # needed to commit the collected data back

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Collect player counts
        run: python -m src.collect
      - name: Commit collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/collected.parquet
          git commit -m "chore: collect player counts $(date -u +%Y-%m-%dT%H:%MZ)" || echo "no changes"
          git push
